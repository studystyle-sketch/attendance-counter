<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出席回数カウンター</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface-2: #f0eeea;
  --border: #e4e2db;
  --border-strong: #c8c5bc;
  --text-primary: #1a1a18;
  --text-secondary: #6b6b66;
  --text-muted: #a8a8a3;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --accent-text: #1d4ed8;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.container { max-width: 700px; margin: 0 auto; }

header { margin-bottom: 2rem; }
header h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
header p { font-size: 13px; color: var(--text-secondary); }

#drop {
  border: 1.5px dashed var(--border-strong);
  border-radius: 12px;
  padding: 2.5rem;
  text-align: center;
  cursor: pointer;
  background: var(--surface);
  transition: background .15s, border-color .15s;
  margin-bottom: 1.5rem;
}
#drop.over { background: var(--accent-bg); border-color: var(--accent); }
#drop i { font-size: 36px; color: var(--text-muted); display: block; margin-bottom: .75rem; }
#drop p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }
#drop span { color: var(--accent-text); text-decoration: underline; cursor: pointer; }
#file-input { display: none; }

#controls {
  display: none;
  align-items: center;
  gap: 8px;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
}
#filename {
  font-size: 13px;
  color: var(--text-secondary);
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

button {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  font-family: inherit;
  padding: 6px 12px;
  border-radius: var(--radius);
  border: 0.5px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-primary);
  cursor: pointer;
  transition: background .12s;
  white-space: nowrap;
}
button:hover { background: var(--surface-2); }
button:active { transform: scale(.98); }
button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
button.primary:hover { background: #1d4ed8; }

#summary {
  display: none;
  gap: 8px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.stat {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: .5rem .875rem;
  min-width: 100px;
}
.stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.stat-val { font-size: 20px; font-weight: 500; }

#result {
  display: none;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.grade-block { border-bottom: 0.5px solid var(--border); }
.grade-block:last-child { border-bottom: none; }

.grade-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--surface-2);
  border-bottom: 0.5px solid var(--border);
}
.grade-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: .04em;
}
.grade-count {
  font-size: 11px;
  color: var(--text-muted);
}

.student-row {
  display: grid;
  grid-template-columns: 140px 36px 1fr;
  align-items: center;
  gap: 8px;
  padding: 7px 16px;
  border-bottom: 0.5px solid var(--border);
}
.student-row:last-child { border-bottom: none; }
.student-row:hover { background: #fafaf9; }

.s-name { font-size: 14px; }
.s-count {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent-text);
  background: var(--accent-bg);
  border-radius: 4px;
  padding: 2px 6px;
  text-align: center;
}
.s-count-empty { display: inline-block; width: 36px; }
.s-dates {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.date-chip {
  background: var(--surface-2);
  border: 0.5px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
}

.error {
  background: #fef2f2;
  border: 0.5px solid #fecaca;
  color: #991b1b;
  border-radius: var(--radius);
  padding: .75rem 1rem;
  font-size: 13px;
  margin-bottom: 1rem;
}

#toast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--text-primary);
  color: #fff;
  font-size: 13px;
  padding: 8px 16px;
  border-radius: 20px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media print {
  body { background: #fff; padding: 0; }
  #drop, #controls, #summary, #error-msg, #toast { display: none !important; }
  #result { display: block !important; border: none; border-radius: 0; }
  .grade-header { background: #f5f5f5; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .student-row:hover { background: none; }
  .s-count { background: #eff6ff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .date-chip { background: #f5f5f3; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .grade-block { page-break-inside: avoid; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>出席回数カウンター</h1>
    <p>CSVまたはTSVファイルを読み込んで生徒ごとの出席回数・出席日を集計します</p>
  </header>

  <div id="drop" onclick="document.getElementById('file-input').click()">
    <i class="ti ti-file-upload"></i>
    <p>CSVまたはTSVをここにドラッグ＆ドロップ<br><span>またはクリックしてファイルを選択</span></p>
  </div>
  <input type="file" id="file-input" accept=".csv,.tsv,.txt">

  <div id="error-msg"></div>

  <div id="controls">
    <i class="ti ti-file-description" style="color:var(--text-muted);font-size:16px"></i>
    <span id="filename"></span>
    <button id="reset-btn"><i class="ti ti-refresh"></i> リセット</button>
    <button id="print-btn"><i class="ti ti-printer"></i> 印刷</button>
    <button id="copy-btn" class="primary"><i class="ti ti-copy"></i> テキストをコピー</button>
  </div>

  <div id="summary">
    <div class="stat">
      <div class="stat-label">生徒数</div>
      <div class="stat-val" id="stat-students">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">学年数</div>
      <div class="stat-val" id="stat-grades">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">総出席コマ数</div>
      <div class="stat-val" id="stat-total">0</div>
    </div>
  </div>

  <div id="result"></div>
</div>

<div id="toast">コピーしました</div>

<script>
const GRADE_ORDER = ['小1','小2','小3','小4','小5','小6','中1','中2','中3','高1','高2','高3','不明・未定','unknown'];

function gradeKey(g) {
  const i = GRADE_ORDER.indexOf(g);
  return i >= 0 ? i : GRADE_ORDER.length;
}

function showError(msg) {
  document.getElementById('error-msg').innerHTML =
    msg ? `<div class="error"><i class="ti ti-alert-circle"></i> ${msg}</div>` : '';
}

function parse(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return null;
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const headers = lines[0].split(sep).map(h => h.trim());

  const idxId    = headers.indexOf('生徒番号');
  const idxName  = headers.indexOf('生徒名');
  const idxGrade = headers.indexOf('学年');
  const idxDate  = headers.indexOf('日付');
  const idxAbs   = headers.indexOf('欠席');

  if (idxId < 0 || idxName < 0 || idxGrade < 0) return null;

  const students = {};
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(sep);
    if (cols.length <= Math.max(idxId, idxName, idxGrade)) continue;

    const id    = (cols[idxId]   || '').trim();
    const name  = (cols[idxName] || '').trim();
    const grade = (cols[idxGrade]|| '').trim();
    const abs   = idxAbs >= 0 ? (cols[idxAbs] || '').trim() : '';
    const rawDate = idxDate >= 0 ? (cols[idxDate] || '').trim() : '';
    const date  = rawDate.replace(/^\d{4}\//, '');

    if (!id || id === '0' || !name) continue;
    if (abs === '1') continue;

    const key = id + '|' + name;
    if (!students[key]) students[key] = { name, grade, count: 0, dates: [] };
    students[key].count++;
    if (date && !students[key].dates.includes(date)) students[key].dates.push(date);
  }

  return Object.values(students);
}

let copyText = '';

function render(data, filename) {
  showError('');
  const byGrade = {};
  data.forEach(s => {
    if (!byGrade[s.grade]) byGrade[s.grade] = [];
    byGrade[s.grade].push(s);
  });

  const grades = Object.keys(byGrade).sort((a, b) => gradeKey(a) - gradeKey(b));
  let html = '', text = '';
  let totalCount = 0;

  grades.forEach(g => {
    const sorted = byGrade[g].sort((a, b) => a.name.localeCompare(b.name, 'ja'));
    html += `<div class="grade-block">`;
    html += `<div class="grade-header"><span class="grade-label">${g}</span><span class="grade-count">${sorted.length}名</span></div>`;
    text += `【${g}】\n`;

    sorted.forEach(s => {
      totalCount += s.count;
      const cntHTML = s.count > 1
        ? `<span class="s-count">${s.count}</span>`
        : `<span class="s-count-empty"></span>`;
      const cntT   = s.count > 1 ? ` ${s.count}` : '';
      const chipsHTML = s.dates.map(d => `<span class="date-chip">${d}</span>`).join('');
      const datesT = s.dates.join('・');

      html += `<div class="student-row">
        <span class="s-name">${s.name}</span>
        ${cntHTML}
        <div class="s-dates">${chipsHTML}</div>
      </div>`;
      text += `${s.name}${cntT}　${datesT}\n`;
    });

    html += `</div>`;
    text += '\n';
  });

  copyText = text.trim();

  document.getElementById('result').innerHTML = html;
  document.getElementById('result').style.display = 'block';
  document.getElementById('stat-students').textContent = data.length;
  document.getElementById('stat-grades').textContent = grades.length;
  document.getElementById('stat-total').textContent = totalCount;
  document.getElementById('summary').style.display = 'flex';
  document.getElementById('filename').textContent = filename;
  document.getElementById('controls').style.display = 'flex';
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const data = parse(e.target.result);
    if (!data) {
      showError('ヘッダーが認識できません。生徒番号・生徒名・学年・欠席 の列が必要です。');
      return;
    }
    if (data.length === 0) {
      showError('対象の生徒データが見つかりませんでした。');
      return;
    }
    render(data, file.name);
  };
  reader.onerror = () => showError('ファイルの読み込みに失敗しました。');
  reader.readAsText(file, 'UTF-8');
}

document.getElementById('file-input').onchange = e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
};

const drop = document.getElementById('drop');
drop.ondragover = e => { e.preventDefault(); drop.classList.add('over'); };
drop.ondragleave = () => drop.classList.remove('over');
drop.ondrop = e => {
  e.preventDefault();
  drop.classList.remove('over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
};

document.getElementById('reset-btn').onclick = () => {
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('file-input').value = '';
  showError('');
  copyText = '';
};

document.getElementById('print-btn').onclick = () => window.print();

document.getElementById('copy-btn').onclick = () => {
  navigator.clipboard.writeText(copyText).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  });
};
</script>
</body>
</html>
